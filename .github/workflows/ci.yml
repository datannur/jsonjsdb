name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build-core:
    name: Test and Build Core Package
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check core changes
        id: core-changes
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            if git diff HEAD~1 HEAD --name-only | grep -qE '^(jsonjsdb/|package\.json|package-lock\.json|eslint\.config\.ts|\.github/workflows/)'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.core-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        if: steps.core-changes.outputs.changed == 'true'
        run: npm ci --no-audit

      - name: Audit signatures
        if: steps.core-changes.outputs.changed == 'true'
        run: npm audit signatures && npm audit --omit=dev --audit-level=high

      - name: Cache Playwright browsers
        if: steps.core-changes.outputs.changed == 'true'
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright browsers
        if: steps.core-changes.outputs.changed == 'true'
        run: npx playwright install chromium

      - name: Lint and type-check
        if: steps.core-changes.outputs.changed == 'true'
        run: |
          npm run format:check
          cd jsonjsdb && npm run lint && npx tsc --noEmit

      - name: Run tests
        if: steps.core-changes.outputs.changed == 'true'
        working-directory: jsonjsdb
        run: npm test

      - name: Build and verify package
        if: steps.core-changes.outputs.changed == 'true'
        working-directory: jsonjsdb
        run: npm run build && npm pack --dry-run

      - name: Upload build artifacts
        if: steps.core-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: jsonjsdb-dist
          path: jsonjsdb/dist/
          retention-days: 7

  test-and-build-builder:
    name: Test and Build Builder Package
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check builder changes
        id: builder-changes
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            if git diff HEAD~1 HEAD --name-only | grep -qE '^(jsonjsdb-builder/|package\.json|package-lock\.json|eslint\.config\.ts|\.github/workflows/)'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        if: steps.builder-changes.outputs.changed == 'true'
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: 'package-lock.json'

      - name: Install dependencies
        if: steps.builder-changes.outputs.changed == 'true'
        run: npm ci --no-audit

      - name: Lint and type-check
        if: steps.builder-changes.outputs.changed == 'true'
        run: |
          npm run format:check
          cd jsonjsdb-builder && npm run lint && npx tsc --noEmit

      - name: Run tests
        if: steps.builder-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-builder
        run: npm test

      - name: Build and verify package
        if: steps.builder-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-builder
        run: npm run build && npm pack --dry-run

      - name: Upload build artifacts
        if: steps.builder-changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: jsonjsdb-builder-dist
          path: jsonjsdb-builder/dist/
          retention-days: 7

  test-python:
    name: CI Python (${{ matrix.python-version }}, ${{ matrix.resolution }})
    runs-on: ubuntu-24.04-arm
    strategy:
      matrix:
        python-version: ['3.9', '3.14']
        resolution: ['lowest', 'highest']
        exclude:
          - python-version: '3.9'
            resolution: 'highest'
          - python-version: '3.14'
            resolution: 'lowest'
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2

      - name: Check python changes
        id: python-changes
        run: |
          if git rev-parse --verify HEAD~1 >/dev/null 2>&1; then
            if git diff HEAD~1 HEAD --name-only | grep -qE '^(jsonjsdb-py/|\.github/workflows/)'; then
              echo "changed=true" >> $GITHUB_OUTPUT
            else
              echo "changed=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup uv
        if: steps.python-changes.outputs.changed == 'true'
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-suffix: ${{ matrix.python-version }}-${{ matrix.resolution }}
          cache-dependency-glob: 'jsonjsdb-py/pyproject.toml'

      - name: Install Python
        if: steps.python-changes.outputs.changed == 'true'
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        if: steps.python-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-py
        run: uv sync --resolution ${{ matrix.resolution }}

      - name: Check lockfile integrity
        if: steps.python-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-py
        run: uv lock --check

      - name: Audit dependencies
        if: steps.python-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-py
        run: uv export --no-dev --no-hashes | uv run pip-audit --disable-pip --no-deps -r /dev/stdin

      - name: Run checks
        if: steps.python-changes.outputs.changed == 'true'
        working-directory: jsonjsdb-py
        run: make check

      - name: Upload coverage to Codecov
        if: steps.python-changes.outputs.changed == 'true' && matrix.python-version == '3.14'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: jsonjsdb-py/coverage.xml
          flags: python
          fail_ci_if_error: false

  ci-success:
    name: CI Success
    runs-on: ubuntu-24.04-arm
    needs: [test-and-build-core, test-and-build-builder, test-python]
    if: always()
    steps:
      - name: Check CI success
        run: |
          echo "Core: ${{ needs.test-and-build-core.result }}"
          echo "Builder: ${{ needs.test-and-build-builder.result }}"
          echo "Python: ${{ needs.test-python.result }}"

          if [[ "${{ needs.test-and-build-core.result }}" == "failure" || "${{ needs.test-and-build-builder.result }}" == "failure" || "${{ needs.test-python.result }}" == "failure" ]]; then
            exit 1
          fi
